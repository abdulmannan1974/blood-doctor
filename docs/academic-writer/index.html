<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academic Writing Agent — Blood Doctor</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>📝</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['"Playfair Display"', 'Georgia', 'serif'],
              sans: ['"Inter"', 'system-ui', 'sans-serif'],
              mono: ['"JetBrains Mono"', 'monospace']
            },
            colors: {
              academic: {
                50: '#f0f4ff',
                100: '#dbe4ff',
                200: '#bac8ff',
                300: '#91a7ff',
                400: '#748ffc',
                500: '#5c7cfa',
                600: '#4c6ef5',
                700: '#4263eb',
                800: '#3b5bdb',
                900: '#364fc7',
                950: '#1e3a8a'
              },
              ink: {
                50: '#f8fafc',
                100: '#f1f5f9',
                200: '#e2e8f0',
                300: '#cbd5e1',
                400: '#94a3b8',
                500: '#64748b',
                600: '#475569',
                700: '#334155',
                800: '#1e293b',
                900: '#0f172a',
                950: '#020617'
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'fade-in-up': 'fadeInUp 0.6s ease-out forwards',
              'slide-in-right': 'slideInRight 0.4s ease-out forwards',
              'pulse-soft': 'pulseSoft 2s ease-in-out infinite',
              'typing': 'typing 1.5s steps(3) infinite',
            }
          }
        }
      }
    </script>
    <style>
      @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
      @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(16px); } 100% { opacity: 1; transform: translateY(0); } }
      @keyframes slideInRight { 0% { opacity: 0; transform: translateX(-16px); } 100% { opacity: 1; transform: translateX(0); } }
      @keyframes pulseSoft { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
      @keyframes typing { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }

      html { scroll-behavior: smooth; }
      body { background-color: #f8fafc; color: #1e293b; font-family: 'Inter', system-ui, sans-serif; }

      .glass-panel {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(226, 232, 240, 0.8);
      }

      .evidence-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border-radius: 9999px;
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .evidence-high { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
      .evidence-moderate { background: #fef9c3; color: #854d0e; border: 1px solid #fde68a; }
      .evidence-low { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
      .evidence-none { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }

      .citation-highlight {
        background: linear-gradient(120deg, #dbeafe 0%, #e0e7ff 100%);
        padding: 1px 4px;
        border-radius: 3px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.85em;
        cursor: pointer;
        transition: background 0.2s;
      }
      .citation-highlight:hover {
        background: linear-gradient(120deg, #bfdbfe 0%, #c7d2fe 100%);
      }

      .writing-area {
        min-height: 200px;
        font-family: 'Inter', system-ui, sans-serif;
        line-height: 1.8;
        font-size: 0.95rem;
      }
      .writing-area:focus {
        outline: none;
      }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #f1f5f9; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
      ::selection { background: rgba(66, 99, 235, 0.15); }

      *:focus-visible { outline: 2px solid #4263eb; outline-offset: 2px; border-radius: 4px; }

      @media print {
        nav, .no-print, button { display: none !important; }
        .glass-panel { background: white !important; backdrop-filter: none !important; border: 1px solid #e2e8f0 !important; }
        .writing-area { font-size: 12pt; line-height: 2; }
      }
    </style>
    <script type="module" crossorigin src="/blood-doctor/academic-writer/assets/index-DZ-Jg5If.js"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
